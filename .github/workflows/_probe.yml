name: PR probe (throwaway)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make a trivial change
        run: |
          mkdir -p _probe
          date -u > _probe/timestamp.txt
      - name: Try to open a PR with the default GITHUB_TOKEN
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "probe: test Actions PR creation"
          title: "PROBE: can Actions open a PR?"
          body: "Throwaway probe testing whether GitHub Actions can open a PR with explicit write permissions and the default token. Safe to close."
          branch: probe/actions-pr-test
          delete-branch: true
