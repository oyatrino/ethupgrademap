<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethereum Upgrade Map — Execution Cities & Consensus Stars (EIP-8133)</title>
<!-- SEO the engine doesn't inject (it adds description/OG/Twitter/theme/favicon itself) -->
<link rel="canonical" href="https://oyatrino.github.io/ethupgrademap/">
<meta name="keywords" content="Ethereum, Ethereum upgrades, execution layer, consensus layer, hard fork, Devcon, Devconnect, EIP-8133, Pectra, Dencun, Shapella, Fusaka, star chart, blockchain map, interactive map">
<link rel="apple-touch-icon" href="favicon.png">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"Ethereum Upgrade Map","url":"https://oyatrino.github.io/ethupgrademap/","applicationCategory":"BrowserApplication","operatingSystem":"Web","browserRequirements":"Requires JavaScript","description":"Interactive dual-projection map of Ethereum execution-layer (Devcon host cities) and consensus-layer (named stars) network upgrades, per EIP-8133.","author":{"@type":"Organization","name":"oyatrino"}}
</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/gh/periplum/periplum-core@v0.3.2/dist/periplum.js"></script>
</head>
<body>
<script>
  // Turn the existing upgrades.json into Periplum canonical items.
  function adapt(raw) {
    return (raw.upgrades || []).map(function (u) {
      var placements = [];
      var ex = u.execution, cl = u.consensus;
      if (ex && ex.lat != null && ex.lon != null) {
        placements.push({ map: "earth", lat: ex.lat, lon: ex.lon,
          label: (ex.city || "").split(",")[0],
          popup: { "Execution": ex.fork, "City": ex.city, "Network": u.status } });
      }
      if (cl && cl.ra != null && cl.dec != null) {
        placements.push({ map: "sky", ra: cl.ra, dec: cl.dec,
          label: (cl.star || "").split(" ")[0],
          popup: { "Consensus": cl.fork, "Star": cl.star } });
      }
      return { name: u.name, date: u.date, status: u.status,
        pairing: (u.combined && u.combined !== u.name) ? u.combined : null,
        placements: placements };
    });
  }

  Periplum.render({
    title: "Ethereum Upgrade Map",
    dataUrl: "https://raw.githubusercontent.com/oyatrino/ethupgrademap/main/upgrades.json",
    adapt: adapt,
    repo: "https://github.com/oyatrino/ethupgrademap",
    favicon: "favicon.png",
    theme: { headerBg: "#16161e", accent: "#4da3ff" },
    routeLabel: "Chronological order",
    statusColors: { "live": "#1f77b4", "scheduled": "#ff7f0e", "planned": "#9aa0b5" },
    seo: {
      description: "Interactive map of Ethereum network upgrades: execution-layer forks named after Devcon/Devconnect host cities on a world globe, and consensus-layer forks named after stars on a celestial RA/Dec chart. Per EIP-8133.",
      image: "https://raw.githubusercontent.com/oyatrino/ethupgrademap/main/starchart.png"
    },
    basemaps: [
      { id: "earth", name: "🌍 Execution · cities", type: "tiles",
        tileUrl: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        attribution: "&copy; OpenStreetMap contributors",
        minZoom: 2, initialView: [30, 15], initialZoom: 2 },
      { id: "sky", name: "✨ Consensus · stars", type: "celestial" }
    ]
  });
</script>
</body>
</html>
